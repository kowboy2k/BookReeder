<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1e1e2e">
  <title>BookReeder</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Écran d'accueil : choix du fichier -->
  <div id="ecran-accueil" class="ecran">
    <h1>BookReeder</h1>
    <p class="sous-titre">Lecture rapide d'ebooks, hors-ligne</p>
    <label class="bouton-ouvrir">
      Ouvrir un fichier EPUB
      <input type="file" id="input-fichier" accept=".epub" hidden>
    </label>
    <button id="btn-demo" class="lien-demo">Essayer avec un texte de démo</button>
    <p id="message-chargement" class="message"></p>

    <!-- Bibliothèque : fichiers déjà chargés, repris au clic -->
    <div id="bibliotheque"></div>
  </div>

  <!-- Écran de lecture RSVP -->
  <div id="ecran-lecture" class="ecran cache">
    <button id="btn-fermer" title="Changer de livre">✖</button>

    <div id="zone-mot" class="avec-cadre">
      <div id="cadre"></div>
      <div id="reticule-haut"></div>
      <div id="mot-affiche"></div>
      <div id="reticule-bas"></div>
    </div>

    <div id="barre-progression">
      <div id="progression-remplissage"></div>
      <div id="marqueurs-chapitres"></div>
      <div id="curseur"></div>
    </div>
    <div id="titre-livre">—</div>
    <button id="info-progression" title="Aller à un chapitre / une position">
      <span id="position-pct">0,00</span>%
      &nbsp;•&nbsp; <span id="chapitre-actuel">—</span>
      &nbsp;•&nbsp; <span id="position-actuelle">0</span> / <span id="total-mots">0</span> mots
    </button>

    <!-- Chapitre précédent · retour rapide · avance rapide · chapitre suivant -->
    <div id="nav-rapide">
      <button id="btn-chap-prec" class="btn-chapitre" title="Chapitre précédent">⏮&#xFE0E;</button>
      <button id="btn-recul" title="Phrase précédente">⏪&#xFE0E;</button>
      <button id="btn-avance" title="Phrase suivante">⏩&#xFE0E;</button>
      <button id="btn-chap-suiv" class="btn-chapitre" title="Chapitre suivant">⏭&#xFE0E;</button>
    </div>

    <!-- Barre principale : liste · vitesse · réglages -->
    <div id="controles">
      <button id="btn-liste" title="Chapitres / aller à une position">☰</button>
      <div id="groupe-vitesse">
        <button id="btn-moins" title="Ralentir (−50 mots/min)">−</button>
        <button id="btn-lecture" title="Lecture / Pause">▶</button>
        <button id="btn-plus" title="Accélérer (+50 mots/min)">+</button>
      </div>
      <button id="btn-reglages" title="Réglages">⚙</button>
    </div>
    <div id="info-vitesse">Vitesse : <span id="vitesse-actuelle">300</span> mots/min</div>
  </div>

  <!-- Panneau de navigation : chapitre + position manuelle -->
  <div id="panneau-navigation" class="cache">
    <div class="panneau-contenu">
      <h2>Navigation</h2>

      <div class="reglage">
        <label for="nav-chapitre">Aller au chapitre</label>
        <select id="nav-chapitre"></select>
      </div>

      <div class="reglage">
        <label>Position dans le livre entier</label>
        <div id="barre-livre">
          <div id="remplissage-livre"></div>
          <div id="marqueurs-livre"></div>
          <div id="curseur-livre"></div>
        </div>
      </div>

      <button id="btn-fermer-navigation">Fermer</button>
    </div>
  </div>

  <!-- Panneau de réglages -->
  <div id="panneau-reglages" class="cache">
    <div class="panneau-contenu">
      <h2>Réglages</h2>

      <div class="reglage">
        <label for="reglage-vitesse">Vitesse : <span id="valeur-vitesse">300</span> mots/min</label>
        <input type="range" id="reglage-vitesse" min="200" max="800" step="10" value="300">
      </div>

      <div class="reglage">
        <label for="reglage-nb-mots">Mots affichés : <span id="valeur-nb-mots">1</span></label>
        <input type="range" id="reglage-nb-mots" min="1" max="4" step="1" value="1">
      </div>

      <div class="reglage reglage-case">
        <label for="reglage-continuer">Continuer la lecture après avance/retour</label>
        <input type="checkbox" id="reglage-continuer" checked>
      </div>

      <div class="reglage">
        <label for="reglage-taille-cadre">Taille du cartouche</label>
        <select id="reglage-taille-cadre">
          <option value="auto" selected>Automatique (selon la police)</option>
          <option value="manuel">Manuelle</option>
        </select>
      </div>

      <div class="reglage" id="bloc-largeur-cadre" style="display:none">
        <label for="reglage-largeur-cadre">Largeur du cartouche : <span id="valeur-largeur-cadre">600</span> px</label>
        <input type="range" id="reglage-largeur-cadre" min="240" max="900" step="10" value="600">
      </div>

      <div class="reglage">
        <label for="reglage-police">Police</label>
        <select id="reglage-police">
          <option value='Georgia, "Times New Roman", serif'>Georgia</option>
          <option value='"Merriweather", Georgia, serif'>Merriweather</option>
        </select>
      </div>

      <div class="reglage">
        <label for="reglage-graisse">Graisse</label>
        <select id="reglage-graisse">
          <option value="300">Fin</option>
          <option value="400" selected>Normal</option>
          <option value="600">Moyen</option>
          <option value="700">Gras</option>
        </select>
      </div>

      <div class="reglage">
        <label for="reglage-espace-lettres">Espacement des lettres : <span id="valeur-espace-lettres">0</span> px</label>
        <input type="range" id="reglage-espace-lettres" min="-1" max="8" step="0.5" value="0">
      </div>

      <div class="reglage">
        <label for="reglage-espace-mots">Espacement des mots : <span id="valeur-espace-mots">0</span> px</label>
        <input type="range" id="reglage-espace-mots" min="0" max="24" step="1" value="0">
      </div>

      <div class="reglage reglage-case">
        <label for="reglage-cadre">Cadre (contour autour du mot)</label>
        <input type="checkbox" id="reglage-cadre" checked>
      </div>

      <div class="reglage reglage-case">
        <label for="reglage-orp">Cartouche ORP (repère central)</label>
        <input type="checkbox" id="reglage-orp" checked>
      </div>

      <div class="reglage reglage-case">
        <label for="reglage-bionic">Lecture bionic (début des mots en gras)</label>
        <input type="checkbox" id="reglage-bionic">
      </div>

      <div class="reglage" id="bloc-bionic-couleur">
        <label for="reglage-bionic-couleur">Couleur du début bionic</label>
        <select id="reglage-bionic-couleur">
          <option value="uniforme" selected>Uniforme (couleur du texte)</option>
          <option value="#f4d03f">Jaune</option>
          <option value="#9aa0a6">Grise</option>
          <option value="#f39c12">Orange</option>
          <option value="#f25c54">Rouge</option>
          <option value="perso">Personnalisé…</option>
        </select>
      </div>

      <div class="reglage reglage-case" id="bloc-bionic-perso" style="display:none">
        <label for="reglage-bio-teinte">Couleur personnalisée</label>
        <input type="color" id="reglage-bio-teinte" value="#f39c12">
      </div>

      <div class="reglage" id="bloc-ecart-reperes">
        <label for="reglage-ecart-reperes">Écartement des repères : <span id="valeur-ecart-reperes">40</span> px</label>
        <input type="range" id="reglage-ecart-reperes" min="10" max="120" step="2" value="40">
      </div>

      <div class="reglage">
        <label for="reglage-long-reperes">Longueur des repères : <span id="valeur-long-reperes">14</span> px</label>
        <input type="range" id="reglage-long-reperes" min="4" max="40" step="2" value="14">
      </div>

      <button id="btn-fermer-reglages">Fermer</button>
    </div>
  </div>

  <script src="lib/jszip.min.js"></script>
  <script src="lib/epub.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
